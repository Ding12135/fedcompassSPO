client_configs:
  train_configs:
    trainer: "NaiveTrainer"
    mode: "step"
    num_local_steps: 2
    optim: "Adam"
    optim_args:
      lr: 0.001
    loss_fn_path: "./loss/celoss.py"
    loss_fn_name: "CELoss"
    do_validation: False
    do_pre_validation: False
    metric_path: "./metric/acc.py"
    metric_name: "accuracy"
    use_dp: False
    epsilon: 1
    clip_grad: False
    clip_value: 1
    clip_norm: 1
    send_gradient: True
    train_batch_size: 64
    val_batch_size: 64
    train_data_shuffle: True
    val_data_shuffle: False

  model_configs:
    model_path: "./model/cnn.py"
    model_name: "CNN"
    model_kwargs:
      num_channel: 1
      num_classes: 10
      num_pixel: 28

  comm_configs:
    compressor_configs:
      enable_compression: False

server_configs:
  scheduler: "SyncScheduler"
  scheduler_kwargs:
    num_clients: 2
    same_init_model: True
  aggregator: "FedAvgAggregator"
  aggregator_kwargs:
    client_weights_mode: "equal"
  device: "cpu"
  num_global_epochs: 1
  server_validation: False
  logging_output_dirname: "./output/smoke"
  logging_output_filename: "mpi_smoke"
  comm_configs:
    grpc_configs:
      server_uri: localhost:50051
      max_message_size: 1048576
      use_ssl: False
