train_configs:
  device: "cpu"
  logging_id: "Client2Smoke"
  logging_output_dirname: "./output/smoke"
  logging_output_filename: "grpc_smoke"

data_configs:
  dataset_path: "./dataset/mnist_dataset.py"
  dataset_name: "get_mnist"
  dataset_kwargs:
    num_clients: 2
    client_id: 1
    partition_strategy: "class_noniid"
    visualization: False
    output_dirname: "./output/smoke"
    output_filename: "visualization.pdf"

comm_configs:
  grpc_configs:
    server_uri: localhost:50051
    max_message_size: 1048576
    use_ssl: False
