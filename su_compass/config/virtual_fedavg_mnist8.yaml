# SU-Compass 虚拟时间实验 — FedAvg + MNIST 8 客户端
# 训练参数对齐 server_fedcompass_paper_mnist8.yaml，便于横向对比

client_configs:
  train_configs:
    device: "cuda"
    trainer: "NaiveTrainer"
    mode: "step"
    num_local_steps: 40
    optim: "Adam"
    optim_args:
      lr: 0.003
    loss_fn_path: "./loss/celoss.py"
    loss_fn_name: "CELoss"
    do_validation: True
    do_pre_validation: False
    metric_path: "./metric/acc.py"
    metric_name: "accuracy"
    use_dp: False
    epsilon: 1
    clip_grad: False
    clip_value: 1
    clip_norm: 1
    send_gradient: True
    train_batch_size: 64
    val_batch_size: 64
    train_data_shuffle: True
    val_data_shuffle: False

  model_configs:
    model_path: "./model/cnn.py"
    model_name: "CNN"
    model_kwargs:
      num_channel: 1
      num_classes: 10
      num_pixel: 28

  comm_configs:
    compressor_configs:
      enable_compression: False
      lossy_compressor: "SZ2"
      lossless_compressor: "blosc"
      error_bounding_mode: "REL"
      error_bound: 1e-3
      flat_model_dtype: "np.float32"
      param_cutoff: 1024

server_configs:
  scheduler: "SyncScheduler"
  scheduler_kwargs:
    num_clients: 8
    same_init_model: True
    max_local_steps: 40
    min_local_steps: 40
  aggregator: "FedAvgAggregator"
  aggregator_kwargs:
    client_weights_mode: "equal"
  device: "cuda"
  num_global_epochs: 50
  server_validation: False
  logging_output_dirname: "./output"
  logging_output_filename: "virtual_fedavg_mnist8"
